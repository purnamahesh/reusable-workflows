name: Audit

on:
  workflow_dispatch:
  workflow_call:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # tag=v6.0.2
      - uses: taiki-e/install-action@a37010ded18ff788be4440302bd6830b1ae50d8b # tag=v2.68.25
        with:
          tool: cargo-audit
      - uses: taiki-e/install-action@a37010ded18ff788be4440302bd6830b1ae50d8b # tag=v2.68.25
        with:
          tool: cargo-deny
      - run: cargo audit
      - run: cargo deny check
