name: Rust Pre-Release

on:
  workflow_call:
    inputs:
      pre-release-label:
        description: 'Pre-release label (e.g. alpha, beta, rc)'
        type: string
        default: 'alpha'
      knope-version:
        description: 'Knope version to install'
        type: string
        default: '0.22.3'
    secrets:
      PAT:
        description: 'Personal access token with contents:write'
        required: true
      CARGO_REGISTRY_TOKEN:
        description: 'crates.io API token'
        required: true

permissions:
  contents: write

jobs:
  pre-release:
    runs-on: ubuntu-latest
    name: Pre-release
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # tag=v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT }}
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Install stable
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # branch=master
        with:
          toolchain: stable
      - uses: knope-dev/action@19617851f9f13ab2f27a05989c55efb18aca3675 # tag=v2.1.2
        with:
          version: ${{ inputs.knope-version }}
      - name: Bump pre-release version
        run: |
          sed -i 's/type = "PrepareRelease"/type = "PrepareRelease"\nprerelease_label = "${{ inputs.pre-release-label }}"/' knope.toml
          knope prepare-release --verbose
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
      - name: Revert knope.toml
        run: git checkout -- knope.toml
      - name: cargo publish
        run: cargo publish --locked --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Commit and push
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
            git commit -m "chore: pre-release v${VERSION}"
            git push
          fi
      - name: Create GitHub pre-release
        run: knope release --verbose
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
